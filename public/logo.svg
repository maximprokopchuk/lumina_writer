<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48">
  <defs>
    <linearGradient id="qg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="glw" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fef9c3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Icon: scaled feather (32→44px), shifted to center vertically in 48px -->
  <g transform="translate(2, 2) scale(1.375)">
    <path d="M8,27 C9,23 14,18 24,5 C29,3 31,9 28,16 C25,21 19,25 12,27 Z"
          fill="url(#qg)"/>
    <line x1="24" y1="5" x2="8" y2="27"
          stroke="#fef3c7" stroke-width="0.75" stroke-linecap="round" opacity="0.55"/>
    <g stroke="#fef3c7" stroke-width="0.45" opacity="0.3" stroke-linecap="round">
      <line x1="21" y1="7"  x2="16" y2="13"/>
      <line x1="24" y1="11" x2="19" y2="17"/>
      <line x1="25" y1="15" x2="20" y2="21"/>
    </g>
    <circle cx="8" cy="27" r="5" fill="url(#glw)" opacity="0.75"/>
    <circle cx="8" cy="27" r="1.4" fill="#fef9c3"/>
  </g>

  <!-- "Lumina" – bold serif -->
  <text x="58" y="31"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="24"
        font-weight="700"
        fill="#1c1917">Lumina</text>

  <!-- "writer" – small caps, muted -->
  <text x="59" y="44"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10.5"
        font-weight="400"
        letter-spacing="4.5"
        fill="#64748b">WRITER</text>
</svg>
